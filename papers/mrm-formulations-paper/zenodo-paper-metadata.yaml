# ── Title ─────────────────────────────────────────────────────────
title: |
  The MRM Framework: A Multi-Source Mathematical Foundation for
  Canadian Carceral, Police, and Oversight Data, Implemented as
  RF Modules in MOIRAIS

# ── Authors ───────────────────────────────────────────────────────
creators:
  - name: Ruhela, Vansh Singh
    affiliation: Independent
    orcid: ""           # FILL once you have an ORCID
    gnd: ""

# ── Description / abstract ────────────────────────────────────────
description: |
  I introduce MRM (McNamara-Ruhela-Medina), a unified
  mathematical framework that integrates five distinct Canadian
  carceral and oversight data streams under one set of estimators
  and one set of primitives. The framework spans (i) the open
  Ontario Tracking Information System (OTIS) provincial
  restrictive-confinement microdata, (ii) the federal Structured
  Intervention Unit Implementation Advisory Panel (SIU IAP) reports
  and Sprott-Doob-Iftene independent academic replications of
  federal SIU operations, (iii) the Ontario Special Investigations
  Unit (Ontario SIU) police-oversight reports ingested by an
  automated scraper, (iv) the Toronto Police Service (TPS)
  open-data crime categories and the Statistics Canada Crime
  Severity Index, and (v) federal Corrections and Conditional
  Release Statistical Overview (CCRSO) aggregate tables introduced
  into the record by Doob's T-539-20 affidavit. MRM is implemented
  in the open-source MOIRAIS package as a set of RF modules,
  comprising a 10-estimator per-individual ensemble, a GEE
  clustering grid for high-cardinality groupings, a Doob chi-square
  family for aggregate contingency tables, a Goffmanian
  institutional-churn analysis suite, and a Mandela Rules
  classifier that operates at both the federal and provincial
  level. I replicate all five published chi-square statistics from
  Sprott-Doob-Iftene (reproducing every value to within 0.01) and
  report a headline empirical finding: the provincial Ontario
  Mandela "torture"-classified proportion rises from 12.5% in
  fiscal 2023 to 20.6% in fiscal 2025, exceeding the federal SIU
  rate of 9.9% that Sprott and Doob reported for fiscal 2019-2020.

